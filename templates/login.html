<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - NexGen Counsel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-container { max-width: 450px; margin: 100px auto; padding: 2.5rem; animation: slideUp 0.6s ease-out; }
        .auth-container h2 { margin-bottom: 2rem; text-align: center; }
        .toggle-btn { text-align: center; display: block; margin-top: 1.5rem; color: var(--primary); cursor: pointer; background: none; border: none; font-size: 1rem; font-weight: 600; width: 100%; transition: color 0.3s; }
        .toggle-btn:hover { color: var(--secondary); }
        .error-msg { color: var(--accent); margin-bottom: 1rem; text-align: center; font-weight: 600; background: rgba(244, 63, 94, 0.1); padding: 0.8rem; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo">NexGen <span>Counsel</span></div>
    </nav>

    <main id="auth-main">
        <div class="glass-card auth-container">
            <!-- Login Form -->
            <form id="login-form" action="{{ url_for('login') }}" method="POST" style="{% if mode == 'register' %}display: none;{% else %}display: block;{% endif %}">
                <h2>Welcome Back</h2>
                {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
                <div class="input-group" style="margin-bottom: 1.5rem;">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="enter your email">
                </div>
                <div class="input-group" style="margin-bottom: 2rem;">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
                <button type="button" class="toggle-btn" onclick="toggleMode('register')">Don't have an account? Sign Up</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" action="{{ url_for('register') }}" method="POST" style="{% if mode == 'register' %}display: block;{% else %}display: none;{% endif %}">
                <h2>Create Account</h2>
                {% if register_error %}<div class="error-msg">{{ register_error }}</div>{% endif %}
                <div class="input-group" style="margin-bottom: 1.5rem;">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="John Doe">
                </div>
                <div class="input-group" style="margin-bottom: 1.5rem;">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="john@example.com">
                </div>
                <div class="input-group" style="margin-bottom: 2rem;">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>
                <button type="button" class="toggle-btn" onclick="toggleMode('login')">Already have an account? Sign In</button>
            </form>
        </div>
    </main>

    <script>
        function toggleMode(mode) {
            document.getElementById('login-form').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = mode === 'register' ? 'block' : 'none';
        }
    </script>
</body>
</html>
