<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Counsel - Premium JEE College Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo">NexGen <span>Counsel</span></div>
    </nav>

    <main id="app-container">
        <!-- Input Step -->
        <section id="input-step" class="step-container active">
            <div class="hero-text">
                <h1>Find Your <span>Dream College</span></h1>
                <p>AI-powered recommendation with selection probability and detailed comparisons.</p>
            </div>

            <form id="counsel-form" class="glass-card">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="percentile">JEE Mains Percentile</label>
                        <input type="number" id="percentile" step="0.0001" min="0" max="100" placeholder="e.g. 99.82" required>
                    </div>

                    <div class="input-group">
                        <label>Cleared JEE Advanced?</label>
                        <div class="checkbox-container" id="adv-toggle">
                            <input type="checkbox" id="adv_cleared" checked>
                            <span>I successfully cleared Advanced</span>
                        </div>
                    </div>

                    <div class="input-group" id="rank-input-div">
                        <label for="rank">JEE Advanced Rank</label>
                        <input type="number" id="rank" placeholder="e.g. 1500">
                    </div>

                    <div class="input-group">
                        <label for="interested_field">Interested Field</label>
                        <select id="interested_field" required>
                            <option value="">Select Specialization</option>
                            <option value="CSE">Computer Science (CSE / AI / DS)</option>
                            <option value="IT">Information Technology (IT / Software)</option>
                            <option value="ECE">Electronics (ECE / ENTC)</option>
                            <option value="Electrical">Electrical (EEE)</option>
                            <option value="Mechanical">Mechanical / Aerospace</option>
                            <option value="Civil">Civil / Architecture / Environmental</option>
                            <option value="Chemical">Chemical / Bio-Technology</option>
                            <option value="Production">Production / Industrial / Mining</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="hobbies">Hobbies / Interests</label>
                        <input type="text" id="hobbies" placeholder="e.g. Coding, Robotics, Sports, Music">
                    </div>

                    <div class="input-group">
                        <label for="desired_college">Desired College (Wishlist)</label>
                        <input type="text" id="desired_college" placeholder="e.g. IIT Bombay">
                    </div>
                </div>

                <button type="submit" class="btn-primary">Generate Counseling Report</button>
            </form>
        </section>

        <!-- Results Step -->
        <section id="results-step" class="step-container">
            <div class="results-header">
                <button id="back-btn" class="btn-text">← Adjust Parameters</button>
                <h2>Your AI Strategy Report</h2>
            </div>
            
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p style="text-align: center; color: var(--text-dim);">Running probabilistic simulations...</p>
            </div>

            <div id="results-content">
                <div class="probability-cards" id="prob-container">
                    <!-- Probability cards injected here -->
                </div>

                <div id="comparison-section">
                    <h3 style="margin-bottom: 1.5rem; font-weight: 800;">🔍 Detailed Comparison</h3>
                    <div class="comparison-table-wrapper">
                        <table class="comparison-table" id="comp-table">
                            <!-- Table rows injected here -->
                        </table>
                    </div>
                </div>

                <h3 style="margin-bottom: 1.5rem; font-weight: 800;">Recommended Alternatives</h3>
                <div class="recommendations-grid" id="rec-list"></div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
